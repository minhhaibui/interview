# ⚙️ redis.conf — Config Redis cho LAB học phỏng vấn
# Mỗi mục có chú thích tiếng Việt: tác dụng + đánh đổi (trade-off).
# File này được mount vào container và nạp bởi: redis-server /usr/local/etc/redis/redis.conf

# ──────────────────────────────────────────────────────────────
# 🌐 MẠNG
# ──────────────────────────────────────────────────────────────
# Lắng nghe mọi địa chỉ trong container (0.0.0.0). Vì ta đã map cổng qua docker,
# chỉ máy local truy cập được. Production KHÔNG nên để mở thế này nếu không có firewall/auth.
bind 0.0.0.0
port 6379

# Bảo vệ khi không cấu hình bind/pass cẩn thận. Trong lab ta tắt cho tiện thử nghiệm.
protected-mode no

# ──────────────────────────────────────────────────────────────
# 🧠 BỘ NHỚ & EVICTION (cốt lõi để hiểu Redis như một cache)
# ──────────────────────────────────────────────────────────────
# Giới hạn RAM tối đa Redis được dùng. Khi chạm trần -> áp dụng maxmemory-policy.
# Đánh đổi: đặt quá thấp -> evict liên tục (miss nhiều); quá cao -> nguy cơ OOM máy chủ.
maxmemory 256mb

# Chính sách xoá key khi đầy bộ nhớ. Đang chọn: allkeys-lru
#   • noeviction     : KHÔNG xoá gì, ghi mới sẽ báo lỗi. Hợp khi Redis là DB chính, không được mất data.
#   • allkeys-lru    : Xoá key ÍT DÙNG GẦN ĐÂY nhất trong TẤT CẢ key. Hợp cache thuần. (đang dùng)
#   • allkeys-lfu    : Xoá key ÍT DÙNG NHẤT theo TẦN SUẤT (Least Frequently Used). Tốt khi có "hot key" ổn định.
#   • volatile-lru   : Như allkeys-lru nhưng chỉ xét key CÓ đặt TTL.
#   • volatile-lfu   : Như allkeys-lfu nhưng chỉ xét key có TTL.
#   • volatile-ttl   : Ưu tiên xoá key có TTL gần hết hạn nhất.
#   • volatile-random / allkeys-random : Xoá ngẫu nhiên (ít dùng).
# Đánh đổi: dùng cache thuần -> allkeys-lru/lfu. Nếu trộn dữ liệu "không được mất" với cache,
# hãy đặt TTL cho phần cache và dùng volatile-* để chỉ evict phần cache.
maxmemory-policy allkeys-lru

# ──────────────────────────────────────────────────────────────
# 💾 PERSISTENCE — AOF vs RDB
# ──────────────────────────────────────────────────────────────
# Có 2 cơ chế lưu xuống đĩa, có thể bật cả hai:
#   • RDB (snapshot): chụp ảnh toàn bộ dữ liệu theo chu kỳ -> file dump.rdb.
#       Ưu: file gọn, restore nhanh, ít ảnh hưởng hiệu năng.
#       Nhược: mất dữ liệu trong khoảng giữa 2 lần snapshot nếu crash.
#   • AOF (append only file): ghi LẠI từng lệnh ghi vào file -> bền hơn.
#       Ưu: mất ít dữ liệu hơn (tuỳ appendfsync).
#       Nhược: file to hơn, cần rewrite định kỳ, ghi đĩa nhiều hơn.

# Bật AOF -> độ bền cao hơn RDB đơn thuần.
appendonly yes

# Tần suất fsync AOF xuống đĩa:
#   • always   : an toàn nhất, mỗi lệnh ghi đều fsync -> CHẬM nhất.
#   • everysec : fsync mỗi giây — cân bằng tốt (mất tối đa ~1s dữ liệu nếu crash). (đang dùng)
#   • no       : để OS tự quyết -> nhanh nhất nhưng rủi ro mất nhiều dữ liệu.
appendfsync everysec

# RDB snapshot: "save <giây> <số-thay-đổi>" -> lưu nếu trong N giây có >= M key thay đổi.
# LƯU Ý: Redis KHÔNG cho comment cùng dòng với directive -> phải để chú thích trên dòng riêng.
# 15 phút mà có >=1 thay đổi -> snapshot
save 900 1
# 5 phút mà có >=10 thay đổi -> snapshot
save 300 10
# 1 phút mà có >=10000 thay đổi -> snapshot (tải nặng thì snapshot dày hơn)
save 60 10000

# ──────────────────────────────────────────────────────────────
# 🔐 BẢO MẬT
# ──────────────────────────────────────────────────────────────
# Đặt mật khẩu cho Redis. Để COMMENT trong lab cho dễ chạy demo.
# Nếu bật, client phải AUTH (hoặc dùng URL redis://:matkhau@host:port).
# Production: LUÔN bật requirepass (hoặc dùng ACL) + không expose cổng ra ngoài.
# requirepass MatKhauSieuManh_DoiDi

# ──────────────────────────────────────────────────────────────
# 📁 NƠI LƯU DỮ LIỆU
# ──────────────────────────────────────────────────────────────
# Thư mục chứa dump.rdb và appendonly. Trùng với volume "redisdata:/data" trong compose.
dir /data
