# 📦 ConfigMap — bơm cấu hình/nội dung vào container mà KHÔNG cần build lại image
# ----------------------------------------------------------------------
# Ở đây ta nhét nguyên 1 file index.html vào ConfigMap, sau đó Deployment sẽ
# mount key "index.html" này thành file /usr/share/nginx/html/index.html.
# => Cùng image nginx công khai nhưng trang web hiển thị nội dung của riêng ta.
# ----------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-content        # tên ConfigMap, sẽ được tham chiếu trong deployment.yaml
  labels:
    app: web               # label chung của lab để dễ lọc: kubectl get cm -l app=web
data:
  # 🔑 Mỗi key trong data có thể trở thành 1 file khi mount dạng volume.
  #    Key "index.html" -> file index.html.
  index.html: |
    <!DOCTYPE html>
    <html lang="vi">
      <head>
        <meta charset="utf-8" />
        <title>Lab Kubernetes</title>
        <style>
          body { font-family: sans-serif; max-width: 640px; margin: 60px auto; line-height: 1.6; }
          h1 { font-size: 2rem; }
          code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
        </style>
      </head>
      <body>
        <h1>Xin chào từ Kubernetes 🚢</h1>
        <p>Trang này được phục vụ bởi <strong>nginx</strong>, nội dung lấy từ một
           <strong>ConfigMap</strong> tên <code>web-content</code>.</p>
        <p>👉 Mỗi request có thể rơi vào một <strong>Pod</strong> khác nhau (Service load-balance
           giữa 3 replica). Để biết Pod nào đang phục vụ, xem header phản hồi hoặc chạy:
           <code>kubectl get pods -o wide</code>.</p>
        <p>Thử các thí nghiệm trong <code>LAB.md</code>: xoá pod (self-heal), scale, rolling update...</p>
      </body>
    </html>
