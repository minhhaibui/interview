# 🚢 Cấu hình cluster kind (Kubernetes in Docker)
# ----------------------------------------------------------------------
# File này mô tả cluster kind sẽ tạo. Mỗi "node" thực ra là 1 container Docker.
# Ta tạo 1 control-plane + 2 worker để thấy pod được RẢI ra nhiều node.
# ----------------------------------------------------------------------
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  # 👑 Node control-plane: nơi chạy API server, scheduler, controller-manager...
  - role: control-plane
    # 🔌 extraPortMappings: "khoan" 1 cổng từ container control-plane ra máy host.
    #    Nhờ đó truy cập NodePort (30080) bên trong cluster bằng cách gõ localhost:8080
    #    trên máy thật. Phải KHỚP với nodePort 30080 trong k8s/service.yaml.
    extraPortMappings:
      - containerPort: 30080  # cổng NodePort bên trong node (khớp service.yaml)
        hostPort: 8080        # cổng trên máy host -> truy cập http://localhost:8080
        protocol: TCP

  # 👷 Worker node 1: nơi pod thực sự chạy
  - role: worker

  # 👷 Worker node 2: thêm 1 worker nữa để pod được phân bổ ra nhiều node
  - role: worker
